// ===== 可拖拽分隔条：上下(手机)/左右(电脑) 调整地图与行程的比例 =====
(function(){
  const grip=document.getElementById('grip'), side=document.getElementById('side'), main=document.getElementById('main');
  const isMobile=()=>window.matchMedia('(max-width:700px)').matches;
  let dragging=false;
  const apply=(e)=>{
    const r=main.getBoundingClientRect();
    if(isMobile()){
      const h=r.bottom-e.clientY;
      side.style.height=Math.max(90, Math.min(r.height-120, h))+'px';
      side.style.width='';
    } else {
      const w=r.right-e.clientX;
      side.style.width=Math.max(200, Math.min(r.width-260, w))+'px';
      side.style.height='';
    }
    if(typeof map!=='undefined'&&map.invalidateSize) map.invalidateSize();
  };
  const down=e=>{ dragging=true; grip.classList.add('drag'); grip.setPointerCapture&&grip.setPointerCapture(e.pointerId); e.preventDefault(); };
  const move=e=>{ if(dragging) apply(e); };
  const up=()=>{ dragging=false; grip.classList.remove('drag'); if(typeof map!=='undefined'&&map.invalidateSize) map.invalidateSize(); };
  grip.addEventListener('pointerdown',down);
  window.addEventListener('pointermove',move);
  window.addEventListener('pointerup',up);
  // 双击分隔条：恢复默认比例
  grip.addEventListener('dblclick',()=>{ side.style.height=''; side.style.width=''; if(typeof map!=='undefined'&&map.invalidateSize) map.invalidateSize(); });
  window.addEventListener('resize',()=>{ side.style.height=''; side.style.width=''; });
})();

  else if (e.target.closest('#lb')) lb.style.display='none';
});

// 全局去重：同一张照片只出现一次
(function(){ const seen=new Set();
  DAYS.forEach(d=>(d.stops||[]).forEach(s=>{ if(s.imgs) s.imgs = s.imgs.filter(u=>{ if(seen.has(u)) return false; seen.add(u); return true; }); }));
})();

const map = L.map('map');
// 底图：浅色 + 半透明（50%）+ 轻度去饱和，让路线和编号点凸显
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {attribution:'© OpenStreetMap © CARTO', maxZoom:19}).addTo(map);
let layers = [];
function numIcon(i, main){
  const bg = main ? '#c0392b' : '#aaa';
  return L.divIcon({html:`<div style="background:${bg};color:#fff;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.4)">${i}</div>`,className:'',iconSize:[26,26],iconAnchor:[13,13]});
}
function showDay(idx){
  document.querySelectorAll('.tab').forEach((t,j)=>t.classList.toggle('active', j===idx));
  layers.forEach(l=>map.removeLayer(l)); layers=[];
  const d = DAYS[idx];
  const side = document.getElementById('side');
  side.innerHTML = `<div class="headnote">${d.note}</div>`;
  const tl = document.createElement('div'); tl.className='tl';
  const pts = [];
  d.stops.forEach((s,i)=>{
    pts.push(s.ll);
    const m = L.marker(s.ll, {icon:numIcon(i+1,true), zIndexOffset:100}).addTo(map)
      .bindPopup(`<b>${i+1}. ${s.n}</b><br><span style="color:#888;font-size:11px">${s.t}${s.stay? ' · '+s.stay:''}</span><br>${s.d}${s.leg?`<br><span style="color:#16745e;font-size:11.5px">➡️ ${s.leg.t}</span>`:''}`);
    layers.push(m);
    const stop = document.createElement('div'); stop.className='stop';
    const shots = s.imgs && s.imgs.length
      ? `<div class="shots">${s.imgs.map(u=>`<img loading="lazy" src="${u}" onerror="this.style.display='none'">`).join('')}</div>` : '';
    const gm = s.g ? `<a class="gmaps" target="_blank" rel="noopener" href="https://www.google.com/maps/search/${encodeURIComponent(s.g)}">📷 更多实拍图 / 导航</a>` : '';
    stop.innerHTML = `<div class="rail"><div class="num">${i+1}</div><div class="line"></div></div>
      <div class="card"><span class="time">${s.t}</span>${s.stay?`<span class="stay">${s.stay}</span>`:''}
      <b class="name">${s.n}</b><p>${s.d}</p>${shots}${gm}</div>`;
    stop.onclick = (e)=>{ if(e.target.closest('.shots')||e.target.closest('.gmaps')) return; map.setView(s.ll, 16); m.openPopup(); };
    tl.appendChild(stop);
    if (s.leg){
      const leg = document.createElement('div'); leg.className='leg';
      leg.innerHTML = `<div class="railc"><div class="dash" style="border-color:${LEGC[s.leg.m]}"></div></div><div class="how" style="border-left:3px solid ${LEGC[s.leg.m]}">${s.leg.t}</div>`;
      tl.appendChild(leg);
      // 地图连线
      if (i < d.stops.length-1){
        // 白色描边（让彩色路线在底图上更跳）
        const halo = L.polyline([s.ll, d.stops[i+1].ll], {
          color:'#fff', weight: s.leg.m==='walk'?8:10, opacity:.9, lineCap:'round'
        }).addTo(map);
        layers.push(halo);
        const seg = L.polyline([s.ll, d.stops[i+1].ll], {
          color: LEGC[s.leg.m], weight: s.leg.m==='walk'?4:6,
          dashArray: s.leg.m==='walk' ? '2 9' : null, lineCap:'round', opacity:1
        }).addTo(map);
        layers.push(seg);
      }
    }
  });
  side.appendChild(tl);
  if (d.extras && d.extras.length){
    const ex = document.createElement('div'); ex.className='extras';
    ex.innerHTML = '<h4>⭐ 顺路备选（没排进主线）</h4>';
    d.extras.forEach((x,i)=>{
      const m = L.marker(x.ll, {icon:numIcon('☆',false)}).addTo(map).bindPopup(`<b>${x.n}</b><br>${x.d}`);
      layers.push(m);
      const c = document.createElement('div'); c.className='xcard';
      c.innerHTML = `<b>${x.n}</b><br>${x.d}`;
      c.onclick = ()=>{ map.setView(x.ll,16); m.openPopup(); };
      ex.appendChild(c);
    });
    side.appendChild(ex);
  }
  map.fitBounds(L.latLngBounds(pts).pad(0.15));
}
const tabs = document.getElementById('tabs');
DAYS.forEach((d,i)=>{
  const t = document.createElement('div');
  t.className='tab'; t.textContent=d.name;
  t.onclick=()=>showDay(i);
  tabs.appendChild(t);
});
showDay(0);
</script>
